repos:
  # ── General hygiene ────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: check-json
      - id: check-toml

  # ── Secrets detection ──────────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ── Shell: lint ────────────────────────────────────────────────────────────
  # .zshrc uses zsh-specific glob qualifiers that shellcheck (bash) cannot parse;
  # only lint simpler shell files where bash-compatible checking is meaningful.
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        files: '(\.sh|\.bash|zsh_aliases)$'
        types: [file]
        args: [--shell=bash, --severity=warning]

  # ── Shell: format ──────────────────────────────────────────────────────────
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.9.0-1
    hooks:
      - id: shfmt
        files: '(\.sh|\.bash|\.zsh|\.zshrc|zsh_aliases)$'
        types: [file]
        args: [--indent=2, --case-indent, --write]

  # ── Lua: format ────────────────────────────────────────────────────────────
  - repo: https://github.com/JohnnyMorganz/StyLua
    rev: v2.0.2
    hooks:
      - id: stylua
        args: [--config-path=.config/nvim/stylua.toml]
